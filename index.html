<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #f2e9d5;
  --bg2:       #e8dfc4;
  --bg3:       #ddd3b5;
  --cream:     #1a2b1b;
  --cream2:    #2d4a2e;
  --cream3:    #4a6b4c;
  --gold:      #956a10;
  --gold-dim:  #b8891e;
  --live:      #c4401f;
  --border:    #cec4a8;
  --img-border: rgba(0,0,0,0.1);
}
body.dark {
  --bg:        #111e12;
  --bg2:       #172518;
  --bg3:       #1c2e1d;
  --cream:     #f0e8d2;
  --cream2:    #b8aa8c;
  --cream3:    #6a7c62;
  --gold:      #c8a84b;
  --gold-dim:  #6b5a25;
  --live:      #d45a3a;
  --border:    #1e2e1f;
  --img-border: rgba(255,255,255,0.1);
}
html, body { transition: background 0.6s ease, color 0.6s ease; }

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Sans', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ────────────────────────────────────────── */
#header {
  height: 220px;
  display: flex;
  align-items: center;
  padding: 0 36px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#clock-block { flex: 1; }

#dateline {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2.5px;
  color: var(--cream2);
  text-transform: uppercase;
  margin-bottom: 4px;
}

#clock {
  font-family: 'Abril Fatface', serif;
  font-size: 128px;
  line-height: 1;
  color: var(--cream);
  letter-spacing: -3px;
}

#seconds {
  font-family: 'DM Sans', sans-serif;
  font-size: 42px;
  font-weight: 300;
  color: var(--cream3);
  letter-spacing: 0;
  vertical-align: super;
  margin-left: 4px;
}

#weather-block {
  width: 282px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}

#w-row1 { display: flex; align-items: flex-end; gap: 8px; }
#w-icon { font-size: 54px; line-height: 1; }
#w-temp {
  font-family: 'Abril Fatface', serif;
  font-size: 72px;
  color: var(--cream);
  line-height: 1;
}
#w-unit { font-size: 26px; font-weight: 400; color: var(--cream3); margin-bottom: 9px; }
#w-desc { font-size: 16px; font-weight: 600; letter-spacing: 1px; color: var(--cream2); }
#w-feels { font-size: 13px; font-weight: 500; color: var(--cream3); }

#w-forecast {
  display: flex;
  gap: 20px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: 4px;
}
.fc-day { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.fc-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--cream3); text-transform: uppercase; }
.fc-icon { font-size: 22px; line-height: 1; }
.fc-range { font-size: 12px; font-weight: 500; color: var(--cream3); white-space: nowrap; }

/* ── TODAY ─────────────────────────────────────────── */
#today-section {
  height: 540px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  padding: 18px 28px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.eyebrow {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3.5px;
  color: var(--cream2);
  text-transform: uppercase;
  flex-shrink: 0;
}

#today-row {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 12px;
}

.chip {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  min-width: 0;
}
.chip.is-live { border-color: var(--live); }

.chip-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--cream3);
  text-transform: uppercase;
  align-self: flex-start;
}
.chip-badge.live { color: var(--live); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.chip-badge.live { animation: blink 1.8s ease-in-out infinite; }

.chip-teams-row {
  display: flex;
  align-items: center;
  width: 100%;
}

.chip-team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}
.chip-team img {
  width: 88px; height: 58px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--img-border);
}
.chip-name {
  font-size: 17px;
  font-weight: 600;
  color: var(--cream);
  text-align: center;
  line-height: 1.2;
}

.chip-score {
  font-family: 'Abril Fatface', serif;
  font-size: 54px;
  color: var(--gold);
  min-width: 110px;
  text-align: center;
  flex-shrink: 0;
  line-height: 1;
}
.chip-score.vs {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  color: var(--cream3);
  letter-spacing: 1px;
}
.chip-time {
  font-family: 'Abril Fatface', serif;
  font-size: 34px;
  color: var(--gold);
  line-height: 1;
  display: block;
}
.chip-ampm {
  font-size: 13px;
  color: var(--cream3);
  letter-spacing: 1px;
  display: block;
}

/* ── GROUPS ─────────────────────────────────────────── */
#groups-section {
  height: 280px;
  flex-shrink: 0;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#groups-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#group-range {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--cream3);
  text-transform: uppercase;
}

#groups-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  transition: opacity 0.4s ease;
}

/* Corner-bracket card — 2×2 grid with watermark letter */
.gc {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  padding: 8px;
  position: relative;
  background:
    linear-gradient(var(--cream3),var(--cream3)) 0 0 / 14px 1.5px no-repeat,
    linear-gradient(var(--cream3),var(--cream3)) 0 0 / 1.5px 14px no-repeat,
    linear-gradient(var(--cream3),var(--cream3)) 100% 0 / 14px 1.5px no-repeat,
    linear-gradient(var(--cream3),var(--cream3)) 100% 0 / 1.5px 14px no-repeat,
    linear-gradient(var(--cream3),var(--cream3)) 0 100% / 14px 1.5px no-repeat,
    linear-gradient(var(--cream3),var(--cream3)) 0 100% / 1.5px 14px no-repeat,
    linear-gradient(var(--cream3),var(--cream3)) 100% 100% / 14px 1.5px no-repeat,
    linear-gradient(var(--cream3),var(--cream3)) 100% 100% / 1.5px 14px no-repeat,
    transparent;
}

/* Big watermark letter in the center */
.gc-letter {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Abril Fatface', serif;
  font-size: 96px;
  color: var(--cream);
  opacity: 0.08;
  pointer-events: none;
  line-height: 1;
  user-select: none;
}

.gc-team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  z-index: 1;
}
.gc-team.tl { align-self: start; justify-self: start; }
.gc-team.tr { align-self: start; justify-self: end; }
.gc-team.bl { align-self: end;   justify-self: start; }
.gc-team.br { align-self: end;   justify-self: end; }
.gc-flag {
  width: 70px; height: 70px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--img-border);
}
.gc-team.r1 .gc-flag { box-shadow: 0 0 0 3px var(--gold-dim); }

.gc-pts {
  font-family: 'Abril Fatface', serif;
  font-size: 24px;
  color: var(--gold);
  line-height: 1;
}
.gc-pts.zero {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 300;
  color: var(--cream3);
}

/* ── UPCOMING ───────────────────────────────────────── */
#upcoming-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 14px 28px 16px;
  overflow: hidden;
  gap: 10px;
}

/* Featured next match */
#next-match {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  min-height: 110px;
}

.nm-slide {
  position: absolute;
  inset: 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.nm-slide.visible {
  opacity: 1;
  transform: translateY(0);
}
.nm-slide.out {
  opacity: 0;
  transform: translateY(-12px);
}

.nm-meta {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nm-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--cream3);
  text-transform: uppercase;
}
.nm-date {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--cream3);
  text-transform: uppercase;
}
.nm-badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold-dim);
  border: 1px solid var(--gold-dim);
  padding: 1px 6px;
  border-radius: 3px;
}

.nm-teams {
  display: flex;
  align-items: center;
  gap: 0;
}
.nm-team { display: flex; align-items: center; gap: 10px; flex: 1; }
.nm-team.right { flex-direction: row-reverse; }
.nm-team img {
  width: 38px; height: 25px;
  object-fit: cover;
  border-radius: 3px;
  border: 1px solid var(--img-border);
}
.nm-name {
  font-size: 18px;
  font-weight: 600;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.nm-center {
  width: 90px;
  text-align: center;
  flex-shrink: 0;
}
.nm-time {
  font-family: 'Abril Fatface', serif;
  font-size: 30px;
  color: var(--gold);
  line-height: 1;
}
.nm-score {
  font-family: 'Abril Fatface', serif;
  font-size: 30px;
  color: var(--gold);
  line-height: 1;
}
.nm-dots {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-top: 2px;
}
.nm-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}
.nm-dot.active { background: var(--cream3); }

/* Upcoming list */
#up-list { flex: 1; overflow: hidden; }

.up-day-head {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--cream2);
  text-transform: uppercase;
  padding: 18px 0 6px;
}
.up-day-head:first-child { padding-top: 4px; }

.up-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 4px;
  /* no border */
}

.up-badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--cream3);
  width: 26px;
  text-align: center;
  flex-shrink: 0;
  opacity: 0.6;
}
.up-badge.ko {
  color: var(--gold-dim);
  border: 1px solid var(--gold-dim);
  border-radius: 2px;
  padding: 1px 4px;
  width: auto;
  opacity: 1;
}

.up-teams {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.up-team { display: flex; align-items: center; gap: 8px; }
.up-team img {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 1px solid var(--img-border);
  flex-shrink: 0;
}
.up-tname {
  font-size: 19px;
  font-weight: 500;
  color: var(--cream);
  white-space: nowrap;
}
.up-vs {
  font-size: 11px;
  color: var(--cream3);
  letter-spacing: 1px;
}

.up-right {
  font-family: 'Abril Fatface', serif;
  font-size: 24px;
  color: var(--gold);
  width: 70px;
  text-align: right;
  flex-shrink: 0;
  line-height: 1;
}
.up-right.time {
  font-family: 'DM Sans', sans-serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--cream3);
  letter-spacing: 0.5px;
}

/* ── THEME TOGGLE ───────────────────────────────────── */
#theme-btn {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--cream3);
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 999;
  transition: background 0.3s, border-color 0.3s, opacity 0.3s;
  opacity: 0.55;
}
#theme-btn:hover { opacity: 1; }
</style>
</head>
<body>

<!-- CLOCK + WEATHER -->
<div id="header">
  <div id="clock-block">
    <div id="dateline">—</div>
    <div id="clock">—<span id="seconds">—</span></div>
  </div>
  <div id="weather-block">
    <div id="w-row1">
      <span id="w-icon">—</span>
      <span id="w-temp">—</span><span id="w-unit">°</span>
    </div>
    <div id="w-desc">—</div>
    <div id="w-feels">—</div>
    <div id="w-forecast"></div>
  </div>
</div>

<!-- TODAY -->
<div id="today-section">
  <div class="eyebrow">Today's Matches</div>
  <div id="today-row"></div>
</div>

<!-- GROUPS -->
<div id="groups-section">
  <div id="groups-header">
    <div class="eyebrow">Group Stage</div>
    <div id="group-range"></div>
  </div>
  <div id="groups-grid"></div>
</div>

<!-- UPCOMING -->
<div id="upcoming-section">
  <div class="eyebrow">Upcoming</div>
  <div id="next-match"></div>
  <div id="up-list"></div>
</div>

<button id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>

<script>
// ── TEAMS ─────────────────────────────────────────────────────────────────────
const TEAMS=[
  {id:"1", name:"Mexico",        iso:"MX",     code:"MEX",g:"A"},
  {id:"2", name:"South Africa",  iso:"ZA",     code:"RSA",g:"A"},

  {id:"48",name:"Panama",        iso:"PA",     code:"PAN",g:"L"},
];
const TM = Object.fromEntries(TEAMS.map(t=>[t.id,t]));

const WMO_ICON = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌦️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'🌨️',77:'🌨️',80:'🌦️',81:'🌦️',82:'🌦️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️'};
const WMO_DESC = {0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Foggy',48:'Icy Fog',51:'Light Drizzle',53:'Drizzle',55:'Heavy Drizzle',61:'Light Rain',63:'Rain',65:'Heavy Rain',71:'Light Snow',73:'Snow',75:'Heavy Snow',77:'Snow Grains',80:'Showers',81:'Showers',82:'Heavy Showers',85:'Snow Showers',86:'Heavy Snow Showers',95:'Thunderstorm',96:'Thunderstorm',99:'Thunderstorm'};
const DS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const KO = {r32:'R32',r16:'R16',qf:'QF',sf:'SF',third:'3RD',final:'FINAL'};

// ── STATE ─────────────────────────────────────────────────────────────────────
let liveGames=[], liveGroups=[];
let nmItems=[], nmIdx=0, nmTimer=null;
let sunriseMs=null, sunsetMs=null, manualOverride=false;

// ── HELPERS ───────────────────────────────────────────────────────────────────
const flag = (iso,r=0) =>
  `<img src="https://flagcdn.com/w40/${iso.toLowerCase()}.png" onerror="this.style.visibility='hidden'" ${r?'style="border-radius:50%;width:'+r+'px;height:'+r+'px"':''}>`;

function todayStr(){
  const n=new Date();
  return String(n.getMonth()+1).padStart(2,'0')+'/'+String(n.getDate()).padStart(2,'0')+'/'+n.getFullYear();
}
const mDate = m => m.local_date.split(' ')[0];
const mTime = m => m.local_date.split(' ')[1];
function fmtTime(t){
  if(!t) return {num:'—',ampm:''};
  const [hh,mm]=t.split(':');
  const h=+hh, ap=h>=12?'pm':'am';
  return {num:`${h%12||12}:${mm}`,ampm:ap};
}

function friendlyDate(s){
  const [mo,dy,yr]=s.split('/');
  const d=new Date(+yr,+mo-1,+dy);
  return `${DS[d.getDay()]}, ${MS[+mo-1]} ${+dy}`;
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function autoTheme(){
  if(manualOverride) return;
  const now=Date.now();
  const isDay=sunriseMs&&sunsetMs ? (now>=sunriseMs && now<sunsetMs) : true;
  document.body.classList.toggle('dark',!isDay);
  document.getElementById('theme-btn').textContent=isDay?'🌙':'☀️';
}

function toggleTheme(){
  manualOverride=true;
  const dark=document.body.classList.toggle('dark');
  document.getElementById('theme-btn').textContent=dark?'☀️':'🌙';
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(){
  const n=new Date();
  const hh=String(n.getHours()).padStart(2,'0');
  const mm=String(n.getMinutes()).padStart(2,'0');
  const ss=String(n.getSeconds()).padStart(2,'0');
  const clock=document.getElementById('clock');
  clock.firstChild.nodeValue=`${hh}:${mm}`;
  document.getElementById('seconds').textContent=ss;
  document.getElementById('dateline').textContent=
    `${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][n.getDay()]}  ·  ${MS[n.getMonth()]} ${n.getDate()}`;
}

// ── WEATHER ───────────────────────────────────────────────────────────────────
async function fetchWeather(){
  try{
    const u='https://api.open-meteo.com/v1/forecast?latitude=37.657&longitude=-77.498'+
      '&current=temperature_2m,apparent_temperature,weather_code,relative_humidity_2m'+
      '&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset'+
      '&timezone=America%2FNew_York&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=4';
    const d=await(await fetch(u)).json();
    const c=d.current, dy=d.daily;
    if(dy.sunrise&&dy.sunrise[0]) sunriseMs=new Date(dy.sunrise[0]).getTime();
    if(dy.sunset&&dy.sunset[0])   sunsetMs =new Date(dy.sunset[0]).getTime();
    autoTheme();
    document.getElementById('w-icon').textContent=WMO_ICON[c.weather_code]||'🌡️';
    document.getElementById('w-temp').textContent=Math.round(c.temperature_2m);
    document.getElementById('w-desc').textContent=WMO_DESC[c.weather_code]||'';
    document.getElementById('w-feels').textContent=
      `Feels like ${Math.round(c.apparent_temperature)}°  ·  ${Math.round(c.relative_humidity_2m)}%`;
    document.getElementById('w-forecast').innerHTML=[1,2,3].map(i=>{
      const dt=new Date(dy.time[i]+'T12:00:00');
      return `<div class="fc-day">
        <span class="fc-label">${DS[dt.getDay()]}</span>
        <span class="fc-icon">${WMO_ICON[dy.weather_code[i]]||'—'}</span>
        <span class="fc-range">${Math.round(dy.temperature_2m_max[i])}·${Math.round(dy.temperature_2m_min[i])}°</span>
      </div>`;
    }).join('');
  }catch(e){ /* silent */ }
}

// ── FETCH LIVE ────────────────────────────────────────────────────────────────
async function fetchWithRetry(url,n=3){
  for(let i=0;i<n;i++){
    try{
      const r=await fetch(url);
      if(!r.ok) throw new Error(`${r.status}`);
      return await r.json();
    }catch(e){
      if(i===n-1) throw e;
      await new Promise(r=>setTimeout(r,2500*(i+1)));
    }
  }
}

async function fetchLive(){
  try{
    const [gd,grd]=await Promise.all([
      fetchWithRetry('https://worldcup26.ir/get/games'),
      fetchWithRetry('https://worldcup26.ir/get/groups'),
    ]);
    liveGames=gd.games||[];
    liveGroups=grd.groups||[];
  }catch(e){ console.warn('Live fetch failed:',e); }
}

// ── RENDER TODAY ──────────────────────────────────────────────────────────────
function renderToday(){
  const today=todayStr();
  const ms=liveGames.filter(m=>mDate(m)===today);
  const row=document.getElementById('today-row');
  if(!ms.length){
    row.innerHTML=`<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;color:var(--cream3);font-size:15px;letter-spacing:1px;">No matches today</div>`;
    return;
  }
  row.innerHTML=ms.map(m=>{
    const isG=m.type==='group', done=m.finished==='TRUE', live=m.time_elapsed==='live';
    const h=TM[m.home_team_id], a=TM[m.away_team_id];
    const grpLabel=m.type==='group'?`Group ${m.group}`:(KO[m.type]||'');
    const badge=live?`<span class="chip-badge live">● LIVE</span>`
                :done?`<span class="chip-badge">FT · ${grpLabel}</span>`
                :`<span class="chip-badge">${grpLabel}</span>`;
    let mid;
    if(done||live){
      mid=`<span class="chip-score">${m.home_score}–${m.away_score}</span>`;
    } else {
      const {num,ampm}=fmtTime(mTime(m));
      mid=`<div class="chip-score vs" style="min-width:110px"><span class="chip-time">${num}</span><span class="chip-ampm">${ampm}</span></div>`;
    }
    if(isG&&h&&a) return `
      <div class="chip${live?' is-live':''}">
        ${badge}
        <div class="chip-teams-row">
          <div class="chip-team">
            <img src="https://flagcdn.com/w160/${h.iso.toLowerCase()}.png" onerror="this.style.visibility='hidden'">
            <span class="chip-name">${h.name}</span>
          </div>
          ${mid}
          <div class="chip-team">
            <img src="https://flagcdn.com/w160/${a.iso.toLowerCase()}.png" onerror="this.style.visibility='hidden'">
            <span class="chip-name">${a.name}</span>
          </div>
        </div>
      </div>`;
    return `
      <div class="chip${live?' is-live':''}">
        ${badge}
        <span style="font-size:15px;color:var(--cream3);text-align:center;">${m.home_team_label||'TBD'} vs ${m.away_team_label||'TBD'}</span>
        ${mid}
      </div>`;
  }).join('');
}

// ── RENDER GROUPS ─────────────────────────────────────────────────────────────
let groupSetIdx=0;
const GROUP_SETS=[['A','B','C'],['D','E','F'],['G','H','I'],['J','K','L']];

function renderGroups(){
  const letters=GROUP_SETS[groupSetIdx];
  document.getElementById('group-range').textContent=`Groups ${letters[0]} – ${letters[2]}`;
  const gm=Object.fromEntries(liveGroups.map(g=>[g.name,g]));
  document.getElementById('groups-grid').innerHTML=letters.map(L=>{
    const g=gm[L];
    const corners=['tl','tr','bl','br'];
    let teamCells;
    if(g){
      teamCells=[...g.teams].sort((a,b)=>(+b.pts-+a.pts)||(+b.gd-+a.gd)||(+b.gf-+a.gf)).slice(0,4).map((t,i)=>{
        const team=TM[t.team_id]; if(!team) return '';
        const pts=+t.pts;
        return `<div class="gc-team ${corners[i]}${i===0?' r1':''}">
          <img class="gc-flag" src="https://flagcdn.com/w80/${team.iso.toLowerCase()}.png" onerror="this.style.visibility='hidden'">
          <span class="gc-pts${pts===0?' zero':''}">${pts||'–'}</span>
        </div>`;
      }).join('');
    } else {
      teamCells=TEAMS.filter(t=>t.g===L).slice(0,4).map((t,i)=>`
        <div class="gc-team ${corners[i]}">
          <img class="gc-flag" src="https://flagcdn.com/w80/${t.iso.toLowerCase()}.png" onerror="this.style.visibility='hidden'">
          <span class="gc-pts zero">–</span>
        </div>`).join('');
    }
    return `<div class="gc"><div class="gc-letter">${L}</div>${teamCells}</div>`;
  }).join('');
}

function rotateGroups(){
  const grid=document.getElementById('groups-grid');
  grid.style.opacity='0';
  setTimeout(()=>{
    groupSetIdx=(groupSetIdx+1)%GROUP_SETS.length;
    renderGroups();
    grid.style.opacity='1';
  },400);
}

// ── RENDER UPCOMING ───────────────────────────────────────────────────────────
function buildNextMatchItems(){
  const today=todayStr();
  // Include today's unfinished + all future
  return liveGames.filter(m=>
    (mDate(m)===today && m.finished!=='TRUE') || mDate(m)>today
  );
}

function showNmSlide(idx){
  const wrap=document.getElementById('next-match');
  const items=nmItems;
  if(!items.length){ wrap.innerHTML=''; return; }

  const m=items[idx];
  const isG=m.type==='group', done=m.finished==='TRUE', live=m.time_elapsed==='live';
  const h=TM[m.home_team_id], a=TM[m.away_team_id];
  const badge=KO[m.type]?`<span class="nm-badge">${KO[m.type]}</span>`:`<span class="nm-badge">GRP ${m.group}</span>`;
  const centerHtml=(done||live)
    ?`<span class="nm-score">${m.home_score}–${m.away_score}</span>`
    :`<span class="nm-time">${mTime(m)}</span>`;

  let teamsHtml;
  if(isG&&h&&a){
    teamsHtml=`
      <div class="nm-team">${flag(h.iso)}<span class="nm-name">${h.name}</span></div>
      <div class="nm-center">${centerHtml}</div>
      <div class="nm-team right"><span class="nm-name">${a.name}</span>${flag(a.iso)}</div>`;
  } else {
    teamsHtml=`<span style="font-size:14px;color:var(--cream3);">${m.home_team_label||'TBD'} vs ${m.away_team_label||'TBD'}</span>
      <div class="nm-center">${centerHtml}</div>`;
  }

  const dots=items.slice(0,Math.min(items.length,8)).map((_,i)=>
    `<div class="nm-dot${i===idx?' active':''}"></div>`).join('');

  // Fade out old
  const old=wrap.querySelector('.nm-slide.visible');
  if(old){ old.classList.remove('visible'); old.classList.add('out'); setTimeout(()=>old.remove(),350); }

  const slide=document.createElement('div');
  slide.className='nm-slide';
  slide.innerHTML=`
    <div class="nm-meta">
      <span class="nm-label">${live?'● Live':'Next Up'}</span>
      <span class="nm-date">${friendlyDate(mDate(m))}</span>
      ${badge}
    </div>
    <div class="nm-teams">${teamsHtml}</div>
    <div class="nm-dots">${dots}</div>`;
  wrap.appendChild(slide);
  // Trigger transition next frame
  requestAnimationFrame(()=>requestAnimationFrame(()=>slide.classList.add('visible')));
}

function startNextMatch(){
  nmItems=buildNextMatchItems();
  if(!nmItems.length){ document.getElementById('next-match').innerHTML=''; return; }
  nmIdx=0;
  showNmSlide(0);
  if(nmTimer) clearInterval(nmTimer);
  nmTimer=setInterval(()=>{
    nmIdx=(nmIdx+1)%Math.min(nmItems.length,8);
    showNmSlide(nmIdx);
  }, 6000);
}

function renderUpList(){
  const today=todayStr();
  const nowD=new Date(); nowD.setHours(0,0,0,0);
  const cutD=new Date(nowD); cutD.setDate(cutD.getDate()+7);
  function parseD(s){ const [mo,dy,yr]=s.split('/'); return new Date(+yr,+mo-1,+dy); }
  const upcoming=liveGames.filter(m=>{ const d=parseD(mDate(m)); return d>nowD && d<=cutD; });
  const byDay={};
  upcoming.forEach(m=>{ const d=mDate(m); (byDay[d]||(byDay[d]=[])).push(m); });

  document.getElementById('up-list').innerHTML=Object.keys(byDay).sort().map(day=>{
    const rows=byDay[day].map(m=>{
      const isG=m.type==='group', done=m.finished==='TRUE';
      const h=TM[m.home_team_id], a=TM[m.away_team_id];
      const ko=KO[m.type];
      const badgeHtml=ko
        ?`<span class="up-badge ko">${ko}</span>`
        :`<span class="up-badge">G${m.group}</span>`;

      let teamsHtml;
      if(isG&&h&&a){
        teamsHtml=`
          <div class="up-teams">
            <div class="up-team"><img src="https://flagcdn.com/w40/${h.iso.toLowerCase()}.png" onerror="this.style.visibility='hidden'"><span class="up-tname">${h.name}</span></div>
            <span class="up-vs">vs</span>
            <div class="up-team"><img src="https://flagcdn.com/w40/${a.iso.toLowerCase()}.png" onerror="this.style.visibility='hidden'"><span class="up-tname">${a.name}</span></div>
          </div>`;
      } else {
        teamsHtml=`<div class="up-teams"><span class="up-tname" style="color:var(--cream3);font-size:12px;">${m.home_team_label||'TBD'} vs ${m.away_team_label||'TBD'}</span></div>`;
      }

      const right=done
        ?`<span class="up-right">${m.home_score}–${m.away_score}</span>`
        :`<span class="up-right time">${mTime(m)}</span>`;

      return `<div class="up-row">${badgeHtml}${teamsHtml}${right}</div>`;
    }).join('');
    return `<div class="up-day-head">${friendlyDate(day)}</div>${rows}`;
  }).join('');
}

// ── REFRESH ───────────────────────────────────────────────────────────────────
let refreshTimer=null;
function scheduleRefresh(){
  if(refreshTimer) clearTimeout(refreshTimer);
  const live=liveGames.some(m=>m.time_elapsed==='live');
  refreshTimer=setTimeout(fullRefresh, live?60000:5*60000);
}

async function fullRefresh(){
  await fetchLive();
  renderToday();
  renderGroups();
  startNextMatch();
  renderUpList();
  scheduleRefresh();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async()=>{
  updateClock();
  setInterval(updateClock,1000);
  setInterval(autoTheme,60000);
  setInterval(rotateGroups,12000);
  fetchWeather();
  setInterval(fetchWeather,30*60000);
  await fullRefresh();
})();
</script>
